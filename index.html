<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Amy 画展启动说明</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f4ed;
        color: #171717;
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      }

      main {
        width: min(680px, calc(100% - 40px));
      }

      h1 {
        margin: 0 0 18px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.6rem, 8vw, 5.5rem);
        line-height: 0.95;
        font-weight: 400;
      }

      p {
        color: #4a4a46;
        line-height: 1.7;
      }

      code {
        background: #ede8dd;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Amy 画展</h1>
      <p>这个版本需要通过服务器运行。请双击当前文件夹里的 <code>启动本地服务器.bat</code>，然后打开 <code>http://localhost:3000</code>。</p>
      <p>Railway 部署后，直接访问 Railway 生成的域名即可。</p>
    </main>
  </body>
</html>
